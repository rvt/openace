name: Build Project

inputs:
  test:
    description: 'Run tests'
    required: false
    default: 'false'
  build:
    description: 'Build the project'
    required: false
    default: 'false'
  board:
    description: 'PICO_BOARD value'
    required: false
    default: 'pico_w'
  platform:
    description: 'PICO_PLATFORM value'
    required: false
    default: 'rp2040'

runs:
  using: 'composite'
  steps:
    - name: Run Tests
      if: ${{ inputs.test == 'true' }}
      shell: bash
      run: |
        cd src
        cmake -B build_test -G Ninja && ninja -C build_test

    - name: Build Project
      if: ${{ inputs.build == 'true' }}
      shell: bash
      run: |
        export PICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk/
        export FREERTOS_KERNEL_PATH=$GITHUB_WORKSPACE/FreeRTOS-Kernel
        cd src/pico
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPICO_PLATFORM=${{ inputs.platform }} -DPICO_BOARD=${{ inputs.board }}
        ninja -C build
        ls -lrt build/*.uf2
