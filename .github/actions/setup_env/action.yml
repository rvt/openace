name: setup-env

runs:
  using: 'composite'
  steps:
    - name: Install Dependencies
      shell: bash
      run: |
        sudo apt-get remove --purge gcc-11
        sudo apt-get install tree git python3 ninja-build cmake gcc-12 gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential libstdc++-arm-none-eabi-newlib libusb-dev python3-pycryptodome

    - name: Checkout pico-sdk
      uses: actions/checkout@v4
      with:
        repository: raspberrypi/pico-sdk
        ref: '2.1.1'
        path: pico-sdk
        submodules: true

    - name: Checkout btstack
      shell: bash
      run: |
        git config pull.rebase false
        cd ${{github.workspace}}/pico-sdk/lib/btstack
        git fetch --all --tags --prune
        git fetch --unshallow
        git checkout v1.6.2

    - name: Checkout FreeRTOS
      uses: actions/checkout@v4
      with:
        repository: FreeRTOS/FreeRTOS-Kernel
        ref: 'V11.2.0'
        path: FreeRTOS-Kernel
        submodules: true

    - name: Patch FreeRTOS
      shell: bash
      run: |
        cd ${{github.workspace}}/FreeRTOS-Kernel
        git apply ${{github.workspace}}/src/freertos.patch
        cd ${{github.workspace}}/FreeRTOS-Kernel/portable/ThirdParty/Community-Supported-Ports
        git apply ${{github.workspace}}/src/Community-Supported-Ports.patch

    - name: Show workspace
      shell: bash
      run: |
        pwd
        gcc --version
        echo "ref: ${{ github.ref }}"
        echo "Workspace: ${{github.workspace}}"
        tree ${{github.workspace}} -d -L 3        
